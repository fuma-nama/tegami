core:changelogs:
  - content: "---\npackages:\n  npm:tegami:\n    type: patch\n---\n\n## Improve Cargo performance by pre-indexing dependencies\n\nThe dependencies of `Cargo.toml` will be pre-indexed to improve performance in large monorepos.\n"
    filename: 2026-07-02-mr3anaoq.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:tegami:\n    type: minor\n---\n\n## Support `prerelease(name)` replay condition\n\nTegami now supports replay condition when entering prerelease.\n"
    filename: 2026-07-02-mr3cbjht.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:@tegami/dart:\n    type: minor\n---\n\n### Add Dart pub plugin\n\nTegami now includes an opt-in Dart plugin at `@tegami/dart` for official pub workspaces. It discovers packages from `pubspec.yaml`, bumps workspace dependency ranges, runs `dart pub get` after versioning, and publishes with `dart pub publish`, adding `--force` in CI.\n"
    filename: 2026-07-02-a9d4e2.md
    v: 0.0.0
