core:changelogs:
  - content: "---\npackages:\n  npm:tegami:\n    type: patch\n---\n\n## Fix `ci` command order problem\n\nThe `ci` now correctly prioritize versioning over publishing.\n"
    filename: 2026-07-09-mrdchud9.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:@tegami/dart:\n    type: patch\n  npm:@tegami/pip:\n    type: patch\n  npm:@tegami/zig:\n    type: patch\n---\n\n## No longer align with core versions\n\nThe package versions of plugins will no longer align with core `tegami` package.\n"
    filename: 2026-07-09-mrdbtus7.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:@tegami/zig:\n    type: patch\n---\n\n### Add Zig package support\n\nTegami now includes an opt-in `@tegami/zig` plugin that discovers `build.zig.zon` packages, follows local `.path` dependencies, bumps dependent packages, and preserves manifest comments while updating package versions.\n"
    filename: 2026-07-09-zig-plugin.md
    v: 0.0.0
