# .github/workflows/tegami-pr-comment.yml — posts the preview built by
# tegami-pr.yml as a PR comment.
#
# Triggered by `workflow_run` so it runs in the base-repo context with write
# permissions, without ever executing the PR's code.
name: Tegami PR Comment

on:
  workflow_run:
    workflows: ['Tegami PR']
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment:
    name: Post preview comment
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download preview
        uses: actions/download-artifact@v4
        with:
          name: tegami-pr-preview
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Post preview comment
        run: pnpm tegami pr comment tegami-pr-preview.md
        env:
          GITHUB_TOKEN: ${{ github.token }}
